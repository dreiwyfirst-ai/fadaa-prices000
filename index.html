<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة fadaa-prices2 - دليل الأسعار الإلكتروني</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(99, 102, 241, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin-top: 10px;
        }

        /* رأس الصفحة والهوية */
        header {
            text-align: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 3px solid var(--primary);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to left, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-muted);
        }

        /* شريط الوقت والمعلومات */
        .meta-info {
            background-color: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-right: 4px solid var(--primary);
            border-left: 1px solid var(--card-border);
            text-align: right;
        }

        .update-time {
            color: var(--accent);
            font-weight: bold;
        }

        /* صندوق البحث الذكي */
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: right;
        }

        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .status {
            color: #e67e22;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }

        /* تنسيق جدول العرض الاحترافي المتناسق مع الديزاين */
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        th {
            background-color: rgba(30, 41, 59, 0.9);
            color: #93c5fd;
            font-weight: 600;
            border-bottom: 2px solid var(--card-border);
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .no-result {
            color: var(--text-muted);
            text-align: center;
            padding: 30px;
        }

        .badge {
            background-color: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(59, 130, 246, 0.4);
            display: inline-block;
        }

        .badge-min {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 5px;
            display: block;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعار المطور -->
        <header>
            <div class="logo-container">
                <!-- سيقرأ ملف logo.jpg عند رفعه، أو يعرض شعاراً مؤقتاً ذكياً بدلاً من التوقف -->
                <img src="logo.jpg" alt="شعار شركة فضاء التقنية" class="logo-img" onerror="this.src='https://via.placeholder.com/150/1e1b4b/93c5fd?text=FADAA'">
            </div>
            <h1>شركة فضاء التقنية</h1>
            <div class="subtitle">دليل الأسعار الإلكتروني المطور</div>
        </header>
        
        <!-- قسم الوقت والتاريخ والتحديث الحقيقي -->
        <div class="meta-info">
            <div id="liveClock">📅 التاريخ: --/--/---- | ⏰ الوقت: --:--:--</div>
            <div id="lastUpdateTime" class="update-time">🔄 جاري التحقق من آخر تحديث للأسعار...</div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث باسم الصنف...">
        
        <div id="statusMessage" class="status">🚧 جاري تحميل البيانات من النظام...</div>
        
        <div class="table-responsive">
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        // رابط الـ CSV المباشر الخاص بك والمجرب
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSn5uA56Qo_nydx3V_pK7IgZKR22Hx_zjilNdpBNbnqelTWsqnjmMt4lE19HtnZbsVsLnUqsLZ94zU/pub?output=csv';
        
        let products = [];

        // 1. تحديث الساعة الحية والتاريخ الفوري
        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('ar-LY', options);
            const timeStr = now.toLocaleTimeString('ar-LY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            document.getElementById('liveClock').innerHTML = `📅 التاريخ: ${dateStr} | ⏰ الوقت: ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. جلب وتحديث البيانات تلقائياً
        async function loadPrices() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.text();
                products = parseCSV(data);
                
                document.getElementById('statusMessage').style.display = 'none';

                // إظهار وقت آخر تعديل تم على ملف قوقل شيت
                const lastModified = response.headers.get('Last-Modified');
                if (lastModified) {
                    const updateDate = new Date(lastModified);
                    const formattedUpdate = updateDate.toLocaleString('ar-LY', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    });
                    document.getElementById('lastUpdateTime').innerHTML = `⏱️ آخر تحديث للأسعار في النظام: ${formattedUpdate}`;
                } else {
                    document.getElementById('lastUpdateTime').innerHTML = `⏱️ تم تحديث الأسعار فوراً عند فتح الصفحة`;
                }

                displayResults(products);

            } catch (error) {
                console.error(error);
                document.getElementById('statusMessage').innerText = "❌ حدث خطأ أثناء تحميل الأسعار من النظام.";
                document.getElementById('lastUpdateTime').innerHTML = `⚠️ تعذر قراءة وقت التحديث`;
            }
        }

        // تفكيك الكود ومعالجة البيانات بشكل سليم
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 2) {
                    result.push({
                        name: columns[0].replace(/"/g, '').trim(),
                        price: columns[1] ? columns[1].trim() : '-',
                        minPrice: columns[2] ? columns[2].trim() : ''
                    });
                }
            }
            return result;
        }

        // محرك البحث الفوري
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (query === '') {
                displayResults(products);
                return;
            }

            const filtered = products.filter(product => {
                return product.name && product.name.toLowerCase().includes(query);
            });

            displayResults(filtered);
        });

        // دالة العرض المتناسقة مع القالب المظلم الفاخر
        function displayResults(results) {
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="no-result">عذراً، الصنف غير موجود</p>';
                return;
            }

            let html = `<table>
                            <tr>
                                <th>الصنف والمادة</th>
                                <th>السعر المعروض</th>
                            </tr>`;
            
            results.forEach(product => {
                let minPriceHTML = product.minPrice ? `<span class="badge-min">أقل سعر: ${product.minPrice} د.ل</span>` : '';
                
                html += `<tr>
                            <td><strong>${product.name || '-'}</strong></td>
                            <td>
                                <span class="badge">${product.price || '-'} د.ل</span>
                                ${minPriceHTML}
                            </td>
                         </tr>`;
            });
            
            html += '</table>';
            resultsContainer.innerHTML = html;
        }

        loadPrices();
    </script>
</body>
</html>
