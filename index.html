<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة فضاء التقنية - دليل الأسعار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 650px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logo-container {
            margin-bottom: 15px;
        }
        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #007bff;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin: 10px 0 5px 0;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .greeting-box {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: 0 4px 10px rgba(0,123,255,0.2);
        }
        .greeting-main {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .greeting-quote {
            font-style: italic;
            opacity: 0.9;
            font-size: 14px;
        }
        .meta-info {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-right: 4px solid #007bff;
        }
        .group-select {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 2px solid #007bff;
            border-radius: 25px;
            font-size: 16px;
            font-family: inherit;
            background-color: white;
            outline: none;
            cursor: pointer;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            text-align: right;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #007bff;
        }
        .status {
            color: #e67e22;
            font-weight: bold;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .no-result {
            color: #95a5a6;
            margin-top: 20px;
        }
        .badge {
            background-color: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
        .badge-min {
            background-color: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
        .show-price-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: background-color 0.2s;
        }
        .show-price-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.jpg" alt="شعار شركة فضاء التقنية" class="logo-img">
        </div>

        <h1>شركة فضاء التقنية</h1>
        <div class="subtitle">دليل الأسعار الإلكتروني</div>
        
        <div class="greeting-box" id="greetingBox">
            <div class="greeting-main" id="greetingText">مرحباً بك في فضاء التقنية ✨</div>
            <div class="greeting-quote" id="quoteText">نتمنى لك يوماً سعيداً ومليئاً بالتوفيق.</div>
        </div>

        <div class="meta-info">
            <div id="liveClock">📅 التاريخ: --/--/---- | ⏰ الوقت: --:--:--</div>
            <div id="lastUpdateTime" class="update-time">🔄 جاري الاتصال بالنظام...</div>
        </div>

        <!-- قائمة اختيار المجموعة الديناميكية -->
        <select id="groupSelect" class="group-select">
            <option value="">📂 جاري تحميل المجموعات...</option>
        </select>

        <!-- صندوق البحث المستمر -->
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث باسم الصنف داخل المجموعة المختارة..." disabled>
        
        <div id="statusMessage" class="status">🚧 يرجى اختيار مجموعة لعرض الأسعار...</div>
        <div id="resultsContainer"></div>
    </div>

    <script>
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSn5uA56Qo_nydx3V_pK7IgZKR22Hx_zjilNdpBNbnqelTWsqnjmMt4lE19HtnZbsVsLnUqsLZ94zU/pub';
        
        // تم توجيه الرابط لصفحة الفهرس الخاصة بك برقم gid المرفق
        const INDEX_URL = `${BASE_URL}?gid=1189181007&output=csv`;
        
        let currentProducts = [];

        function setupSmartGreeting() {
            const hour = new Date().getHours();
            const greetingTextEl = document.getElementById('greetingText');
            const quoteTextEl = document.getElementById('quoteText');

            const morningQuotes = [
                "أصبحنا وأصبح الملك لله.. نسأل الله أن يفتح لكم أبواب الرزق والتوفيق اليوم 🌅",
                "صباح الخير والبركة! بداية يوم جديدة مليئة بالفرص والنجاح المتجدد 🚀",
                "اللهم بك أصبحنا، وعليك توكلنا.. يومكم مبارك وموفق بإذن الله 🎯",
                "تفاءل وابدأ يومك بكل طاقة إيجابية.. أهلاً بك في دليل أسعارنا المطور 💡"
            ];

            const eveningQuotes = [
                "مساء الخير والأنوار.. نسأل الله لكم راحة البال والبركة في الرزق 🌙",
                "يسعدنا تواجدكم معنا هذا المساء.. نتمنى لكم جولة تسوق وتصفح ممتازة ✨",
                "اللهم اجعل هذا المساء حاملاً لنا من الخير فوق ما نرجو 🤲",
                "أهلاً بك.. نسعى دائماً لتقديم أفضل الأسعار لكم في كل وقت 💼"
            ];

            const nightQuotes = [
                "مرحباً بك في فضاء التقنية.. نسأل الله لك التوفيق والسداد دائماً 🌟",
                "العمل الدؤوب والاهتمام بالتفاصيل هو أول خطوات النجاح والريادة 🎯",
                "اللهم بارك لنا في أوقاتنا وفي أعمالنا وفي أرزاقنا يا رب العالمين 🙌"
            ];

            let selectedQuote = "";
            if (hour >= 5 && hour < 12) {
                greetingTextEl.innerHTML = "☀️ صباح الخير والبركة.. أهلاً بك!";
                selectedQuote = morningQuotes[Math.floor(Math.random() * morningQuotes.length)];
            } else if (hour >= 12 && hour < 23) {
                greetingTextEl.innerHTML = "🌙 مساؤكم طيب وسعيد.. أهلاً بك!";
                selectedQuote = eveningQuotes[Math.floor(Math.random() * eveningQuotes.length)];
            } else {
                greetingTextEl.innerHTML = "✨ أهلاً وسهلاً بك في فضاء التقنية!";
                selectedQuote = nightQuotes[Math.floor(Math.random() * nightQuotes.length)];
            }
            quoteTextEl.innerHTML = selectedQuote;
        }

        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('ar-LY', options);
            const timeStr = now.toLocaleTimeString('ar-LY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('liveClock').innerHTML = `📅 التاريخ: ${dateStr} | ⏰ الوقت: ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        setupSmartGreeting();

        // تحميل الفهرس أولاً لإنشاء القائمة المنسدلة للمجموعات
        async function loadIndex() {
            try {
                const response = await fetch(INDEX_URL);
                const data = await response.text();
                const groups = parseCSV(data);
                
                const groupSelect = document.getElementById('groupSelect');
                groupSelect.innerHTML = '<option value="">📁 اختر المجموعة المراد عرضها...</option>';
                
                groups.forEach(group => {
                    if(group.groupname && group.gid !== undefined) {
                        const option = document.createElement('option');
                        option.value = group.gid;
                        option.textContent = group.groupname;
                        groupSelect.appendChild(option);
                    }
                });
                
                document.getElementById('lastUpdateTime').innerHTML = `✅ تم تحميل قنوات النظام بنجاح`;
            } catch (error) {
                console.error("خطأ في جلب الفهرس:", error);
                document.getElementById('statusMessage').innerText = "❌ حدث خطأ أثناء الاتصال بالفهرس المرجعي.";
            }
        }

        // جلب أسعار المجموعة المحددة بناء على اختيار المستخدم
        async function loadGroupPrices(gid) {
            const statusMessage = document.getElementById('statusMessage');
            const searchInput = document.getElementById('searchInput');
            const resultsContainer = document.getElementById('resultsContainer');
            
            statusMessage.style.display = 'block';
            statusMessage.innerText = "⏳ جاري تحميل أصناف المجموعة المختارة...";
            resultsContainer.innerHTML = '';
            searchInput.value = '';
            searchInput.disabled = true;

            try {
                const groupUrl = `${BASE_URL}?gid=${gid}&output=csv`;
                const response = await fetch(groupUrl);
                const data = await response.text();
                
                currentProducts = parseCSV(data);
                
                statusMessage.style.display = 'none';
                searchInput.disabled = false;
                
                displayResults(currentProducts);
                
            } catch (error) {
                console.error("خطأ في جلب بيانات المجموعة:", error);
                statusMessage.innerText = "❌ تعذر تحميل أصناف هذه المجموعة.";
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length === 0) return [];
            
            const headers = lines[0].replace(/"/g, '').split(',').map(h => {
                return h.replace('#', '').replace('-', '').replace(' ', '').trim().toLowerCase();
            });
            
            return lines.slice(1).map(line => {
                if (!line.trim()) return null;
                const columns = line.replace(/"/g, '').split(',');
                let obj = {};
                headers.forEach((header, index) => {
                    let cleanedHeader = header.replace('#', '').replace('-', '').replace(' ', '').trim().toLowerCase();
                    obj[cleanedHeader] = columns[index] ? columns[index].trim() : '';
                });
                return obj;
            }).filter(item => item !== null);
        }

        document.getElementById('groupSelect').addEventListener('change', (e) => {
            const selectedGid = e.target.value;
            if (selectedGid !== "") {
                loadGroupPrices(selectedGid);
            } else {
                document.getElementById('searchInput').disabled = true;
                document.getElementById('statusMessage').style.display = 'block';
                document.getElementById('statusMessage').innerText = "🚧 يرجى اختيار مجموعة لعرض الأسعار...";
                document.getElementById('resultsContainer').innerHTML = '';
            }
        });

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') {
                displayResults(currentProducts);
                return;
            }

            const filtered = currentProducts.filter(product => {
                return product.name && product.name.toLowerCase().includes(query);
            });

            displayResults(filtered);
        });

        window.revealPrice = function(button, actualPrice) {
            button.parentElement.innerHTML = `<span class="badge-min">${actualPrice}</span>`;
        };

        function displayResults(results) {
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="no-result">عذراً، لا توجد نتائج مطابقة لبحثك</p>';
                return;
            }

            let html = `<table>
                            <tr>
                                <th>الصنف</th>
                                <th>الكمية</th>
                                <th>السعر</th>
                                <th>أقل سعر</th>
                            </tr>`;
            
            results.forEach(product => {
                if (!product.name) return;
                const minPriceValue = product.minprice || '-';
                
                html += `<tr>
                            <td><strong>${product.name || '-'}</strong></td>
                            <td>${product.quantity || '-'}</td>
                            <td><span class="badge">${product.price || '-'}</span></td>
                            <td>
                                ${minPriceValue !== '-' ? `<button class="show-price-btn" onclick="revealPrice(this, '${minPriceValue}')">👁️ إظهار</button>` : '-'}
                            </td>
                         </tr>`;
            });
            
            html += '</table>';
            resultsContainer.innerHTML = html;
        }

        loadIndex();
    </script>
</body>
</html>
